name: Production CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend CI (prod)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./TripBorderFrontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'TripBorderFrontend/package-lock.json'

      - name: Install deps (reproducible CI)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test (TDD safety net)
        run: npm run test

      - name: Setup SSL certs (for build if needed)
        run: |
          mkdir -p ssl
          echo "${{ secrets.TRIP_BORDER_FRONTEND_SSL_CERT }}" > ./ssl/tripborderfrontend-cert.pem
          echo "${{ secrets.TRIP_BORDER_FRONTEND_SSL_KEY }}" > ./ssl/tripborderfrontend-key.pem

      - name: Build
        run: npm run build --if-present

      - name: Docker Compose validate (your stack parity)
        run: |
          if [ -f compose.prod.yml ]; then
            docker compose -f compose.prod.yml config --quiet && echo "✅ compose.prod.yml valid" || echo "⚠️ compose issue (check syntax)"
          fi